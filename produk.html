{% extends 'base.html' %}
{% block content %}
<h2>Produk Layanan Kami</h2>
<div class="grid">
    {% for p in produk_list %}
    <div class="product-card">
        <h3>{{ p.nama }}</h3>
        <p>{{ p.desc }}</p>
        <p class="price"><strong>{{ p.harga }}</strong></p>
    </div>
    {% endfor %}
</div>
{% endblock %}
